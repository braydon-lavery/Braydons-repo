<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Body Solutions PT - Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            margin: 0;
            padding: 0;
        }

        header {
            background: #0077b6;
            color: #fff;
            padding: 1.5em 1em;
            text-align: center;
        }

        main {
            max-width: 600px;
            margin: 2em auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px #0002;
            padding: 2em;
        }

        h2 {
            color: #0077b6;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #e3f2fd;
            margin: 0.5em 0;
            padding: 1em;
            border-radius: 5px;
        }

        .contact-btn {
            display: inline-block;
            margin-top: 2em;
            padding: 0.8em 2em;
            background: #00b4d8;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.2s;
        }

        .contact-btn:hover {
            background: #0096c7;
        }
    </style>
</head>

<body>
    <header>
        <h1>Body Solutions PT</h1>
        <div>Your Physical Therapy Dashboard</div>
    </header>
    <main>
        <section>
            <h2>Patient Exercises</h2>
            <ul>
                <li>
                    <strong>Shoulder Flexion Stretch</strong><br>
                    3 sets of 10 reps, daily
                </li>
                <li>
                    <strong>Knee Extension</strong><br>
                    Hold for 10 seconds, repeat 5 times, twice daily
                </li>
                <li>
                    <strong>Ankle Circles</strong><br>
                    20 circles in each direction, once daily
                </li>
            </ul>
        </section>
        <a href="mailto:contact@bodysolutionspt.com" class="contact-btn">Contact Us</a>
    </main>
</body>

</html>
